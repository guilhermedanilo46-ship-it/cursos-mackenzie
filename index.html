<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Cursos Mackenzie - Formação e Contratação 2026</title>
    
    <!-- BIBLIOTECA QR CODE (CORRETA) -->
    <script src="https://cloudflare.com"></script>

    <link href="https://jsdelivr.net" rel="stylesheet">
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* MANTENHA SEU CSS ORIGINAL AQUI */
        :root { --mackenzie-red: #CC0000; --white: #ffffff; }
        body { background-color: #f4f4f4; }
        .modal-pix { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .pix-box { background: white; padding: 40px; border-radius: 20px; max-width: 450px; width: 90%; text-align: center; border-top: 10px solid var(--mackenzie-red); }
        #pix-qr img { margin: 0 auto; } /* Centraliza o QR Code */
    </style>
</head>
<body>

<!-- ... SEU HTML DOS STEPS 1, 2 e 3 ... -->

<!-- MODAL PIX (AJUSTADO) -->
<div class="modal-pix" id="modalPix">
    <div class="pix-box">
        <h4 class="fw-900 text-danger mb-3">PAGAMENTO PIX</h4>
        <p class="text-muted small">Escaneie o código abaixo para liberar seu curso.</p>
        
        <div id="pix-loading" class="py-5">
            <div class="spinner-border text-danger" role="status"></div>
            <p class="mt-3 fw-bold">Gerando seu PIX...</p>
        </div>

        <!-- TAG ALTERADA PARA DIV -->
        <div id="pix-qr" style="display:none; margin: 20px auto; padding: 10px; background: white; width: 220px; border-radius: 10px; border: 1px solid #eee;"></div>
        
        <div id="btn-whatsapp-container" style="display:none">
            <div class="mb-3">
                <label class="small fw-bold text-muted mb-1">CÓDIGO PIX (COPIA E COLA)</label>
                <input type="text" id="pix-code" class="form-control text-center small bg-light" readonly>
                <button class="btn btn-dark btn-sm w-100 mt-2" onclick="copyPix()">COPIAR CÓDIGO</button>
            </div>
            <button class="btn btn-success w-100 py-3 fw-800" onclick="enviarWhatsApp()">
                <i class="fab fa-whatsapp me-2"></i> JÁ PAGUEI, AGENDAR AGORA!
            </button>
        </div>
        <button class="btn btn-link text-muted small mt-3" onclick="closePix()">Cancelar</button>
    </div>
</div>

<script src="https://jquery.com"></script>
<script>
    const API_URL = '/gerar'; // Verifique se o nome do arquivo na Cloudflare é gerar.js
    const WHATSAPP_NUMBER = '558391151608';
    
    // ... LÓGICA DE NAVEGAÇÃO DOS STEPS (MANTER A SUA) ...

    function openPix() {
        $('#modalPix').css('display', 'flex');
        $('#pix-loading').show();
        $('#pix-qr').hide().html(''); // Limpa QR Code anterior
        $('#btn-whatsapp-container').hide();
        
        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                valor: lead.curso.preco,
                nome: lead.nome,
                email: lead.email,
                cpf: lead.cpf
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.sucesso) {
                $('#pix-loading').hide();
                
                // GERA O QR CODE FISICAMENTE
                new QRCode(document.getElementById("pix-qr"), {
                    text: data.copia_cola,
                    width: 200,
                    height: 200
                });

                $('#pix-qr').show();
                $('#pix-code').val(data.copia_cola);
                $('#btn-whatsapp-container').fadeIn();
            } else {
                alert("Erro ao gerar: " + data.erro);
                closePix();
            }
        })
        .catch(err => {
            alert("Erro de conexão.");
            closePix();
        });
    }

    function copyPix() {
        const input = document.getElementById('pix-code');
        input.select();
        navigator.clipboard.writeText(input.value);
        alert("Copiado!");
    }

    function closePix() { $('#modalPix').hide(); }

    function enviarWhatsApp() {
        const msg = encodeURIComponent(`Olá, paguei o curso ${lead.curso.nome}.`);
        window.open(`https://wa.me{WHATSAPP_NUMBER}?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
